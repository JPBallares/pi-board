<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pi-board</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    header {
      background: #1e293b;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
      z-index: 10;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    header h1 { margin: 0; font-size: 1.1rem; color: #38bdf8; white-space: nowrap; }
    .controls { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    select, input, button {
      background: #334155;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 0.375rem;
      padding: 0.35rem 0.5rem;
      font-size: 0.85rem;
    }
    button { cursor: pointer; }
    button:hover { background: #475569; }
    button.primary { background: #2563eb; border-color: #2563eb; }
    button.primary:hover { background: #1d4ed8; }
    button.danger { background: #dc2626; border-color: #dc2626; }
    button.danger:hover { background: #b91c1c; }
    .board {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 0.75rem;
      padding: 1rem;
      overflow-x: auto;
      min-height: calc(100vh - 70px);
    }
    .column {
      background: #1e293b;
      border-radius: 0.5rem;
      display: flex;
      flex-direction: column;
      min-width: 240px;
      max-height: calc(100vh - 90px);
    }
    .column-header {
      padding: 0.6rem 0.75rem;
      font-weight: 600;
      text-transform: capitalize;
      border-bottom: 1px solid #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.9rem;
    }
    .column-header .count {
      background: #334155;
      border-radius: 999px;
      padding: 0.1rem 0.45rem;
      font-size: 0.75rem;
    }
    .column-body {
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      overflow-y: auto;
      min-height: 60px;
    }
    .card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.375rem;
      padding: 0.6rem;
      cursor: grab;
      transition: box-shadow 0.15s;
    }
    .card:hover { border-color: #38bdf8; box-shadow: 0 0 0 1px #38bdf8; }
    .card-title { font-weight: 500; font-size: 0.9rem; margin-bottom: 0.3rem; }
    .card-meta {
      font-size: 0.75rem;
      color: #94a3b8;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      align-items: center;
      margin-top: 0.3rem;
    }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.1rem 0.35rem;
      border-radius: 0.25rem;
      font-size: 0.7rem;
      font-weight: 500;
    }
    .chip.type-bug { background: rgba(220,38,38,0.2); color: #f87171; }
    .chip.type-feature { background: rgba(37,99,235,0.2); color: #60a5fa; }
    .chip.type-chore { background: rgba(107,114,128,0.2); color: #cbd5e1; }
    .chip.priority-urgent { background: rgba(220,38,38,0.2); color: #f87171; }
    .chip.priority-high { background: rgba(234,179,8,0.2); color: #facc15; }
    .chip.priority-medium { background: rgba(56,189,248,0.2); color: #7dd3fc; }
    .chip.priority-low { background: rgba(16,185,129,0.2); color: #6ee7b7; }
    .label-chip { font-size: 0.7rem; padding: 0.1rem 0.35rem; border-radius: 0.25rem; }
    .assignee-chip { font-size: 0.7rem; padding: 0.1rem 0.35rem; border-radius: 0.25rem; background: #334155; }
    .status-backlog .column-header { color: #94a3b8; }
    .status-in-progress .column-header { color: #38bdf8; }
    .status-code-review .column-header { color: #a78bfa; }
    .status-uat .column-header { color: #fbbf24; }
    .status-completed .column-header { color: #4ade80; }
    .toast {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      background: #1e293b;
      border: 1px solid #334155;
      padding: 0.75rem 1rem;
      border-radius: 0.375rem;
      font-size: 0.85rem;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 50;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1rem;
    }
    .modal h2 { margin: 0 0 0.75rem; font-size: 1.1rem; }
    .form-group { margin-bottom: 0.75rem; }
    .form-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.25rem; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      background: #0f172a;
      color: #e2e8f0;
      border: 1px solid #475569;
      border-radius: 0.375rem;
      padding: 0.4rem 0.5rem;
      font-size: 0.9rem;
    }
    .form-group textarea { min-height: 80px; resize: vertical; }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
    .label-picker { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.25rem; }
    .label-option { cursor: pointer; padding: 0.2rem 0.5rem; border-radius: 0.25rem; border: 2px solid transparent; opacity: 0.7; font-size: 0.75rem; }
    .label-option.selected { opacity: 1; border-color: #e2e8f0; }
    .sprint-info { font-size: 0.8rem; color: #94a3b8; }

    @media (max-width: 1200px) {
      .board { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .board { grid-template-columns: 1fr; }
      .column { max-height: none; }
    }
  </style>
</head>
<body>
  <header>
    <h1>pi-board</h1>
    <div class="controls">
      <select id="sprintFilter"><option value="">All Sprints</option></select>
      <button id="activeSprintBtn" style="font-size:0.75rem;padding:0.35rem 0.5rem">Active Sprint</button>
      <select id="assigneeFilter"><option value="">All Assignees</option></select>
      <select id="labelFilter"><option value="">All Labels</option></select>
      <input type="text" id="searchInput" placeholder="Search title or description…" />
      <button id="searchBtn">Search</button>
      <label style="display:flex;align-items:center;gap:0.3rem;font-size:0.8rem;color:#94a3b8;cursor:pointer">
        <input type="checkbox" id="archivedToggle" /> Show archived
      </label>
      <select id="sortSelect">
        <option value="order-asc">Order ↑</option>
        <option value="order-desc">Order ↓</option>
        <option value="priority-asc">Priority ↑</option>
        <option value="priority-desc">Priority ↓</option>
        <option value="created_at-desc">Newest</option>
        <option value="created_at-asc">Oldest</option>
      </select>
      <button id="addTaskBtn" class="primary">+ Task</button>
      <button id="refreshBtn" title="Refresh now">&#x21bb;</button>
      <select id="autoRefreshSelect" title="Auto refresh">
        <option value="0">Auto: Off</option>
        <option value="5000">5s</option>
        <option value="10000">10s</option>
        <option value="30000">30s</option>
        <option value="60000">1m</option>
        <option value="300000">5m</option>
      </select>
      <button id="labelsBtn">Labels</button>
      <button id="peopleBtn">People</button>
      <button id="sprintBtn">Sprints</button>
    </div>
  </header>
  <main class="board" id="board"></main>
  <div class="toast" id="toast"></div>

  <!-- Task Modal -->
  <div class="modal-overlay" id="taskModalOverlay">
    <div class="modal" id="taskModal">
      <h2 id="taskModalTitle">Task</h2>
      <div id="taskView">
        <div class="form-group"><label>Title</label><div id="vTitle"></div></div>
        <div class="form-group"><label>Description</label><div id="vDesc" style="white-space:pre-wrap"></div></div>
        <div class="form-group"><label>Type</label><div id="vType"></div></div>
        <div class="form-group"><label>Status</label><div id="vStatus"></div></div>
        <div class="form-group"><label>Priority</label><div id="vPriority"></div></div>
        <div class="form-group"><label>Sprint</label><div id="vSprint"></div></div>
        <div class="form-group"><label>Assignee</label><div id="vAssignee"></div></div>
        <div class="form-group"><label>Labels</label><div id="vLabels"></div></div>
        <div class="form-group"><label>Due Date</label><div id="vDueDate"></div></div>
        <div class="form-group"><label>Estimate</label><div id="vEstimate"></div></div>
        <div class="form-group"><label>Depends On</label><div id="vDependsOn"></div></div>
        <div class="form-group"><label>Blocking</label><div id="vBlocking"></div></div>
        <div class="form-group"><label>Subtasks <span id="subtaskCount"></span></label><div id="vSubtasks"></div></div>
        <div class="form-group" style="display:flex;gap:0.5rem">
          <input id="addSubtaskInput" placeholder="New subtask…" style="flex:1" />
          <button id="addSubtaskBtn" class="primary" style="font-size:0.8rem;padding:0.35rem 0.6rem">Add</button>
        </div>
        <div class="modal-actions">
          <button id="deleteTaskBtn" class="danger">Delete</button>
          <button id="duplicateTaskBtn">Duplicate</button>
          <button id="editTaskBtn">Edit</button>
          <button id="closeTaskBtn">Close</button>
        </div>
      </div>
      <div id="taskEdit" style="display:none">
        <input type="hidden" id="eId" />
        <div class="form-group"><label>Title</label><input id="eTitle" /></div>
        <div class="form-group"><label>Description</label><textarea id="eDesc"></textarea></div>
        <div class="form-group"><label>Type</label><select id="eType"><option value="bug">Bug</option><option value="feature">Feature</option><option value="chore">Chore</option></select></div>
        <div class="form-group"><label>Status</label><select id="eStatus"><option value="backlog">Backlog</option><option value="in-progress">In Progress</option><option value="code-review">Code Review</option><option value="uat">UAT</option><option value="completed">Completed</option></select></div>
        <div class="form-group"><label>Priority</label><select id="ePriority"><option value="urgent">Urgent</option><option value="high">High</option><option value="medium">Medium</option><option value="low">Low</option></select></div>
        <div class="form-group"><label>Sprint</label><select id="eSprint"><option value="">None</option></select></div>
        <div class="form-group"><label>Assignee</label><select id="eAssignee"><option value="">Unassigned</option></select></div>
        <div class="form-group"><label>Labels</label><div class="label-picker" id="eLabels"></div></div>
        <div class="form-group"><label>Due Date</label><input id="eDueDate" type="date" /></div>
        <div class="form-group"><label>Estimate</label><input id="eEstimate" type="number" min="0" placeholder="Story points" /></div>
        <div class="form-group"><label>Depends On</label><select id="eDependsOn" multiple style="min-height:60px;background:#0f172a;color:#e2e8f0;border:1px solid #475569;border-radius:0.375rem;padding:0.4rem 0.5rem;font-size:0.9rem"></select></div>
        <div class="modal-actions">
          <button id="cancelEditBtn">Cancel</button>
          <button id="saveTaskBtn" class="primary">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Add Task Modal -->
  <div class="modal-overlay" id="addModalOverlay">
    <div class="modal">
      <h2>New Task</h2>
      <div class="form-group"><label>Title</label><input id="nTitle" /></div>
      <div class="form-group"><label>Description</label><textarea id="nDesc"></textarea></div>
      <div class="form-group"><label>Type</label><select id="nType"><option value="feature">Feature</option><option value="bug">Bug</option><option value="chore">Chore</option></select></div>
      <div class="form-group"><label>Status</label><select id="nStatus"><option value="backlog">Backlog</option><option value="in-progress">In Progress</option><option value="code-review">Code Review</option><option value="uat">UAT</option><option value="completed">Completed</option></select></div>
      <div class="form-group"><label>Priority</label><select id="nPriority"><option value="medium">Medium</option><option value="urgent">Urgent</option><option value="high">High</option><option value="low">Low</option></select></div>
      <div class="form-group"><label>Sprint</label><select id="nSprint"><option value="">None</option></select></div>
      <div class="form-group"><label>Assignee</label><select id="nAssignee"><option value="">Unassigned</option></select></div>
      <div class="form-group"><label>Labels</label><div class="label-picker" id="nLabels"></div></div>
      <div class="form-group"><label>Due Date</label><input id="nDueDate" type="date" /></div>
      <div class="form-group"><label>Estimate</label><input id="nEstimate" type="number" min="0" placeholder="Story points" /></div>
      <div class="form-group"><label>Depends On</label><select id="nDependsOn" multiple style="min-height:60px;background:#0f172a;color:#e2e8f0;border:1px solid #475569;border-radius:0.375rem;padding:0.4rem 0.5rem;font-size:0.9rem"></select></div>
      <div class="modal-actions">
        <button id="cancelAddBtn">Cancel</button>
        <button id="createTaskBtn" class="primary">Create</button>
      </div>
    </div>
  </div>

  <!-- Labels Modal -->
  <div class="modal-overlay" id="labelsModalOverlay">
    <div class="modal">
      <h2>Labels</h2>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem">
        <input id="lName" placeholder="Name" />
        <input id="lColor" placeholder="#38bdf8" value="#38bdf8" style="width:100px" />
        <button id="addLabelBtn" class="primary">Add</button>
      </div>
      <div id="labelsList"></div>
      <div class="modal-actions">
        <button id="closeLabelsBtn">Close</button>
      </div>
    </div>
  </div>

  <!-- People Modal -->
  <div class="modal-overlay" id="peopleModalOverlay">
    <div class="modal">
      <h2>People</h2>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem">
        <input id="pName" placeholder="Name" />
        <input id="pColor" placeholder="#4ade80" value="#4ade80" style="width:100px" />
        <button id="addPersonBtn" class="primary">Add</button>
      </div>
      <div id="peopleList"></div>
      <div class="modal-actions">
        <button id="closePeopleBtn">Close</button>
      </div>
    </div>
  </div>

  <!-- Sprints Modal -->
  <div class="modal-overlay" id="sprintsModalOverlay">
    <div class="modal">
      <h2>Sprints</h2>
      <div style="display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap">
        <input id="sName" placeholder="Sprint name" />
        <input id="sStart" type="date" />
        <input id="sEnd" type="date" />
        <button id="addSprintBtn" class="primary">Create</button>
      </div>
      <div id="sprintsList"></div>
      <div class="modal-actions">
        <button id="closeSprintsBtn">Close</button>
      </div>
    </div>
  </div>

  <script>
    const STATUSES = ['backlog','in-progress','code-review','uat','completed'];
    const boardEl = document.getElementById('board');
    const sprintFilterEl = document.getElementById('sprintFilter');
    const searchInputEl = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const sortSelect = document.getElementById('sortSelect');
    const refreshBtn = document.getElementById('refreshBtn');
    const autoRefreshSelect = document.getElementById('autoRefreshSelect');
    const toastEl = document.getElementById('toast');
    let autoRefreshInterval = null;

    let allLabels = [];
    let allPeople = [];
    let allSprints = [];
    let isModalOpen = false;
    let isDragging = false;

    // Load preferences
    const savedSort = localStorage.getItem('pi-board-sort');
    if (savedSort) sortSelect.value = savedSort;
    const savedAutoRefresh = localStorage.getItem('pi-board-auto-refresh');
    if (savedAutoRefresh !== null) autoRefreshSelect.value = savedAutoRefresh;

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      setTimeout(() => toastEl.classList.remove('show'), 2000);
    }

    function openModal(overlayId) {
      document.getElementById(overlayId).classList.add('open');
      isModalOpen = true;
    }
    function closeModal(overlayId) {
      document.getElementById(overlayId).classList.remove('open');
      isModalOpen = false;
    }

    async function api(url, opts) {
      const res = await fetch(url, opts);
      if (!res.ok) throw new Error((await res.json()).error || 'Request failed');
      return res.json();
    }

    async function fetchTasks() {
      const params = new URLSearchParams();
      if (sprintFilterEl.value) params.set('sprint_id', sprintFilterEl.value);
      const assigneeFilter = document.getElementById('assigneeFilter').value;
      if (assigneeFilter) params.set('assignee_id', assigneeFilter);
      const labelFilter = document.getElementById('labelFilter').value;
      if (labelFilter) params.set('label_ids', labelFilter);
      const search = searchInputEl.value.trim();
      if (search) params.set('search', search);
      const [sortBy, sortOrder] = sortSelect.value.split('-');
      if (sortBy) { params.set('sort_by', sortBy); params.set('sort_order', sortOrder); }
      if (document.getElementById('archivedToggle').checked) params.set('archived', '1');
      const url = '/api/tasks' + (params.toString() ? '?' + params.toString() : '');
      const data = await api(url);
      return data.tasks || [];
    }

    async function fetchAllTasks() {
      const data = await api('/api/tasks');
      return data.tasks || [];
    }

    async function fetchSprints() {
      const data = await api('/api/sprints');
      allSprints = data.sprints || [];
      return data;
    }

    async function fetchLabels() {
      const data = await api('/api/labels');
      allLabels = data.labels || [];
      return allLabels;
    }

    async function fetchPeople() {
      const data = await api('/api/people');
      allPeople = data.people || [];
      return allPeople;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function renderLabelChips(labels) {
      if (!labels || labels.length === 0) return '';
      return labels.map(l => `<span class="label-chip" style="background:${escapeHtml(l.color)}22;color:${escapeHtml(l.color)}">${escapeHtml(l.name)}</span>`).join('');
    }

    function renderCard(task) {
      const isBlocked = task.depends_on && task.depends_on.some(d => d.status !== 'completed');
      const div = document.createElement('div');
      div.className = 'card';
      div.draggable = true;
      div.dataset.id = task.id;
      div.innerHTML = `
        <div class="card-title">${escapeHtml(task.title)}</div>
        <div class="card-meta">
          <span class="chip type-${task.type}">${task.type}</span>
          <span class="chip priority-${task.priority}">${task.priority}</span>
          ${task.estimate ? `<span class="chip">${task.estimate}pt</span>` : ''}
          ${isBlocked ? `<span class="chip" style="background:rgba(220,38,38,0.3);color:#f87171">blocked</span>` : ''}
          ${task.assignee ? `<span class="assignee-chip" style="background:${task.assignee.color}22;color:${task.assignee.color}">${escapeHtml(task.assignee.name)}</span>` : ''}
        </div>
        <div class="card-meta">${renderLabelChips(task.labels)}</div>
      `;
      div.addEventListener('dragstart', (e) => {
        isDragging = true;
        e.dataTransfer.setData('text/plain', task.id);
        e.dataTransfer.effectAllowed = 'move';
      });
      div.addEventListener('dragend', () => { isDragging = false; });
      div.addEventListener('click', () => openTaskModal(task.id));
      return div;
    }

    async function renderBoard() {
      const tasks = await fetchTasks();
      boardEl.innerHTML = '';
      for (const status of STATUSES) {
        const col = document.createElement('div');
        col.className = `column status-${status}`;
        const statusTasks = tasks.filter(t => t.status === status);
        col.innerHTML = `
          <div class="column-header">
            <span>${status.replace(/-/g, ' ')}</span>
            <span class="count">${statusTasks.length}</span>
          </div>
          <div class="column-body" data-status="${status}"></div>
        `;
        const body = col.querySelector('.column-body');
        statusTasks.forEach((task, idx) => {
          body.appendChild(renderCard(task));
        });
        body.addEventListener('dragover', (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; });
        body.addEventListener('drop', async (e) => {
          e.preventDefault();
          const draggedId = e.dataTransfer.getData('text/plain');
          const id = Number(draggedId);
          const newStatus = body.dataset.status;
          if (!id || !newStatus) return;
          const children = Array.from(body.children).filter(c => c.dataset.id !== draggedId);
          const dropIndex = children.filter(c => {
            const rect = c.getBoundingClientRect();
            return e.clientY < rect.top + rect.height / 2;
          }).length;
          const order = dropIndex * 10;
          try {
            await api(`/api/tasks/${id}/move`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: newStatus, order }) });
            showToast('Task moved');
            await renderBoard();
          } catch (err) {
            showToast('Failed to move task: ' + err.message);
          }
        });
        boardEl.appendChild(col);
      }
    }

    async function populateSprintFilter() {
      await fetchSprints();
      const current = sprintFilterEl.value;
      sprintFilterEl.innerHTML = '<option value="">All Sprints</option>';
      for (const s of allSprints) {
        const opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = `${s.name} (${s.status})`;
        if (String(s.id) === current) opt.selected = true;
        sprintFilterEl.appendChild(opt);
      }
    }

    async function populateAssigneeFilter() {
      await fetchPeople();
      const current = document.getElementById('assigneeFilter').value;
      document.getElementById('assigneeFilter').innerHTML = '<option value="">All Assignees</option>' + allPeople.map(p => `<option value="${p.id}">${escapeHtml(p.name)}</option>`).join('');
      document.getElementById('assigneeFilter').value = current;
    }

    async function populateLabelFilter() {
      await fetchLabels();
      const current = document.getElementById('labelFilter').value;
      document.getElementById('labelFilter').innerHTML = '<option value="">All Labels</option>' + allLabels.map(l => `<option value="${l.id}">${escapeHtml(l.name)}</option>`).join('');
      document.getElementById('labelFilter').value = current;
    }

    function populateSelect(selectEl, items, valueKey, textFn, emptyLabel) {
      const val = selectEl.value;
      selectEl.innerHTML = emptyLabel ? `<option value="">${emptyLabel}</option>` : '';
      for (const item of items) {
        const opt = document.createElement('option');
        opt.value = item[valueKey];
        opt.textContent = textFn(item);
        selectEl.appendChild(opt);
      }
      selectEl.value = val;
    }

    async function populateDependencySelect(selectEl, excludeId, selectedIds) {
      const data = await api('/api/tasks');
      const tasks = (data.tasks || []).filter(t => t.id !== excludeId);
      selectEl.innerHTML = '';
      for (const task of tasks) {
        const opt = document.createElement('option');
        opt.value = task.id;
        opt.textContent = `#${task.id} ${task.title} [${task.status}]`;
        if (selectedIds.includes(task.id)) opt.selected = true;
        selectEl.appendChild(opt);
      }
    }

    function renderLabelPicker(containerId, selectedIds = []) {
      const container = document.getElementById(containerId);
      container.innerHTML = '';
      for (const label of allLabels) {
        const span = document.createElement('span');
        span.className = 'label-option' + (selectedIds.includes(label.id) ? ' selected' : '');
        span.style.background = label.color + '33';
        span.style.color = label.color;
        span.textContent = label.name;
        span.dataset.id = label.id;
        span.addEventListener('click', () => span.classList.toggle('selected'));
        container.appendChild(span);
      }
    }

    function getSelectedLabelIds(containerId) {
      return Array.from(document.querySelectorAll(`#${containerId} .label-option.selected`)).map(el => Number(el.dataset.id));
    }

    function renderSubtasks(task) {
      const container = document.getElementById('vSubtasks');
      const countEl = document.getElementById('subtaskCount');
      if (!task.subtasks || task.subtasks.length === 0) {
        container.innerHTML = '<span style="opacity:0.6">None</span>';
        countEl.textContent = '';
        return;
      }
      const completed = task.subtasks.filter(s => s.completed).length;
      countEl.textContent = `(${completed}/${task.subtasks.length})`;
      container.innerHTML = task.subtasks.map(s => `
        <div class="subtask-item" data-id="${s.id}" style="display:flex;align-items:center;gap:0.5rem;margin:0.2rem 0">
          <input type="checkbox" ${s.completed ? 'checked' : ''} data-action="toggle" data-id="${s.id}" />
          <span style="flex:1;${s.completed ? 'text-decoration:line-through;opacity:0.6' : ''}">${escapeHtml(s.title)}</span>
          <button data-action="delete" data-id="${s.id}" style="background:none;border:none;color:#f87171;cursor:pointer;font-size:0.8rem">×</button>
        </div>
      `).join('');
      container.querySelectorAll('[data-action="toggle"]').forEach(el => {
        el.addEventListener('change', async () => {
          try {
            await api(`/api/subtasks/${el.dataset.id}/toggle`, { method: 'POST' });
            const { task } = await api(`/api/tasks/${task.id}`);
            renderSubtasks(task);
            await renderBoard();
          } catch (err) { showToast(err.message); }
        });
      });
      container.querySelectorAll('[data-action="delete"]').forEach(el => {
        el.addEventListener('click', async () => {
          try {
            await api(`/api/subtasks/${el.dataset.id}`, { method: 'DELETE' });
            const { task } = await api(`/api/tasks/${task.id}`);
            renderSubtasks(task);
            await renderBoard();
          } catch (err) { showToast(err.message); }
        });
      });
    }

    // Task detail / edit modal
    async function openTaskModal(taskId) {
      const { task } = await api(`/api/tasks/${taskId}`);
      document.getElementById('taskModalTitle').textContent = `Task #${task.id}`;
      document.getElementById('vTitle').textContent = task.title;
      document.getElementById('vDesc').textContent = task.description || '(none)';
      document.getElementById('vType').innerHTML = `<span class="chip type-${task.type}">${task.type}</span>`;
      document.getElementById('vStatus').textContent = task.status;
      document.getElementById('vPriority').innerHTML = `<span class="chip priority-${task.priority}">${task.priority}</span>`;
      const sprint = allSprints.find(s => s.id === task.sprint_id);
      document.getElementById('vSprint').textContent = sprint ? sprint.name : 'None';
      document.getElementById('vAssignee').innerHTML = task.assignee ? `<span class="assignee-chip" style="background:${task.assignee.color}22;color:${task.assignee.color}">${task.assignee.name}</span>` : 'Unassigned';
      document.getElementById('vLabels').innerHTML = renderLabelChips(task.labels) || 'None';
      document.getElementById('vDueDate').textContent = task.due_date || 'None';
      document.getElementById('vEstimate').textContent = task.estimate ? `${task.estimate} points` : 'None';
      document.getElementById('vDependsOn').innerHTML = task.depends_on && task.depends_on.length > 0
        ? task.depends_on.map(d => `<span class="chip">#${d.id} ${escapeHtml(d.title)} (${d.status})</span>`).join(' ')
        : 'None';
      document.getElementById('vBlocking').innerHTML = task.blocking && task.blocking.length > 0
        ? task.blocking.map(b => `<span class="chip">#${b.id} ${escapeHtml(b.title)} (${b.status})</span>`).join(' ')
        : 'None';
      renderSubtasks(task);
      document.getElementById('addSubtaskInput').dataset.taskId = task.id;

      // Edit form
      document.getElementById('eId').value = task.id;
      document.getElementById('eTitle').value = task.title;
      document.getElementById('eDesc').value = task.description || '';
      document.getElementById('eType').value = task.type;
      document.getElementById('eStatus').value = task.status;
      document.getElementById('ePriority').value = task.priority;
      populateSelect(document.getElementById('eSprint'), allSprints, 'id', s => s.name, 'None');
      document.getElementById('eSprint').value = task.sprint_id || '';
      populateSelect(document.getElementById('eAssignee'), allPeople, 'id', p => p.name, 'Unassigned');
      document.getElementById('eAssignee').value = task.assignee_id || '';
      renderLabelPicker('eLabels', task.labels.map(l => l.id));
      document.getElementById('eDueDate').value = task.due_date || '';
      document.getElementById('eEstimate').value = task.estimate || '';
      populateDependencySelect(document.getElementById('eDependsOn'), task.id, task.depends_on.map(d => d.id));

      document.getElementById('taskView').style.display = '';
      document.getElementById('taskEdit').style.display = 'none';
      openModal('taskModalOverlay');
    }

    document.getElementById('closeTaskBtn').addEventListener('click', () => closeModal('taskModalOverlay'));
    document.getElementById('editTaskBtn').addEventListener('click', () => {
      document.getElementById('taskView').style.display = 'none';
      document.getElementById('taskEdit').style.display = '';
    });
    document.getElementById('cancelEditBtn').addEventListener('click', () => {
      document.getElementById('taskView').style.display = '';
      document.getElementById('taskEdit').style.display = 'none';
    });
    document.getElementById('addSubtaskBtn').addEventListener('click', async () => {
      const input = document.getElementById('addSubtaskInput');
      const title = input.value.trim();
      const taskId = Number(input.dataset.taskId);
      if (!title || !taskId) return;
      try {
        await api('/api/subtasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ task_id: taskId, title }) });
        input.value = '';
        const { task } = await api(`/api/tasks/${taskId}`);
        renderSubtasks(task);
        await renderBoard();
      } catch (err) {
        showToast('Failed to add subtask: ' + err.message);
      }
    });
    document.getElementById('saveTaskBtn').addEventListener('click', async () => {
      const id = Number(document.getElementById('eId').value);
      const body = {
        title: document.getElementById('eTitle').value,
        description: document.getElementById('eDesc').value,
        type: document.getElementById('eType').value,
        status: document.getElementById('eStatus').value,
        priority: document.getElementById('ePriority').value,
        sprint_id: document.getElementById('eSprint').value ? Number(document.getElementById('eSprint').value) : null,
        assignee_id: document.getElementById('eAssignee').value ? Number(document.getElementById('eAssignee').value) : null,
        labelIds: getSelectedLabelIds('eLabels'),
        due_date: document.getElementById('eDueDate').value || null,
        estimate: document.getElementById('eEstimate').value ? Number(document.getElementById('eEstimate').value) : null,
        dependsOnIds: Array.from(document.getElementById('eDependsOn').selectedOptions).map(o => Number(o.value)),
      };
      try {
        await api(`/api/tasks/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        showToast('Task saved');
        closeModal('taskModalOverlay');
        await renderBoard();
      } catch (err) {
        showToast('Save failed: ' + err.message);
      }
    });
    document.getElementById('duplicateTaskBtn').addEventListener('click', async () => {
      const id = Number(document.getElementById('eId').value);
      try {
        await api(`/api/tasks/${id}/duplicate`, { method: 'POST' });
        showToast('Task duplicated');
        closeModal('taskModalOverlay');
        await renderBoard();
      } catch (err) {
        showToast('Duplicate failed: ' + err.message);
      }
    });
    document.getElementById('deleteTaskBtn').addEventListener('click', async () => {
      const id = Number(document.getElementById('eId').value);
      if (!confirm('Delete this task?')) return;
      try {
        await api(`/api/tasks/${id}`, { method: 'DELETE' });
        showToast('Task deleted');
        closeModal('taskModalOverlay');
        await renderBoard();
      } catch (err) {
        showToast('Delete failed: ' + err.message);
      }
    });

    // Add task modal
    document.getElementById('addTaskBtn').addEventListener('click', async () => {
      await fetchSprints();
      await fetchPeople();
      await fetchLabels();
      populateSelect(document.getElementById('nSprint'), allSprints, 'id', s => s.name, 'None');
      populateSelect(document.getElementById('nAssignee'), allPeople, 'id', p => p.name, 'Unassigned');
      renderLabelPicker('nLabels');
      populateDependencySelect(document.getElementById('nDependsOn'), null, []);
      openModal('addModalOverlay');
    });
    document.getElementById('cancelAddBtn').addEventListener('click', () => closeModal('addModalOverlay'));
    document.getElementById('createTaskBtn').addEventListener('click', async () => {
      const body = {
        title: document.getElementById('nTitle').value,
        description: document.getElementById('nDesc').value,
        type: document.getElementById('nType').value,
        status: document.getElementById('nStatus').value,
        priority: document.getElementById('nPriority').value,
        sprint_id: document.getElementById('nSprint').value ? Number(document.getElementById('nSprint').value) : null,
        assignee_id: document.getElementById('nAssignee').value ? Number(document.getElementById('nAssignee').value) : null,
        labelIds: getSelectedLabelIds('nLabels'),
        due_date: document.getElementById('nDueDate').value || null,
        estimate: document.getElementById('nEstimate').value ? Number(document.getElementById('nEstimate').value) : null,
        dependsOnIds: Array.from(document.getElementById('nDependsOn').selectedOptions).map(o => Number(o.value)),
      };
      try {
        await api('/api/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        showToast('Task created');
        closeModal('addModalOverlay');
        document.getElementById('nTitle').value = '';
        document.getElementById('nDesc').value = '';
        await renderBoard();
        await populateSprintFilter();
      } catch (err) {
        showToast('Create failed: ' + err.message);
      }
    });

    // Labels modal
    async function renderLabelsList() {
      await fetchLabels();
      const container = document.getElementById('labelsList');
      container.innerHTML = allLabels.map(l => `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.35rem">
          <span class="label-chip" style="background:${escapeHtml(l.color)}22;color:${escapeHtml(l.color)}">${escapeHtml(l.name)}</span>
          <button class="danger" style="font-size:0.75rem;padding:0.15rem 0.35rem" data-id="${l.id}">Delete</button>
        </div>
      `).join('');
      container.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', async () => {
          try {
            await api(`/api/labels/${btn.dataset.id}`, { method: 'DELETE' });
            showToast('Label deleted');
            await renderLabelsList();
            await renderBoard();
          } catch (err) { showToast(err.message); }
        });
      });
    }
    document.getElementById('labelsBtn').addEventListener('click', () => { renderLabelsList(); openModal('labelsModalOverlay'); });
    document.getElementById('closeLabelsBtn').addEventListener('click', () => closeModal('labelsModalOverlay'));
    document.getElementById('addLabelBtn').addEventListener('click', async () => {
      try {
        await api('/api/labels', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: document.getElementById('lName').value, color: document.getElementById('lColor').value }) });
        document.getElementById('lName').value = '';
        showToast('Label created');
        await renderLabelsList();
      } catch (err) { showToast(err.message); }
    });

    // People modal
    async function renderPeopleList() {
      await fetchPeople();
      const container = document.getElementById('peopleList');
      container.innerHTML = allPeople.map(p => `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.35rem">
          <span class="assignee-chip" style="background:${p.color}22;color:${p.color}">${escapeHtml(p.name)}</span>
          <button class="danger" style="font-size:0.75rem;padding:0.15rem 0.35rem" data-id="${p.id}">Delete</button>
        </div>
      `).join('');
      container.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', async () => {
          try {
            await api(`/api/people/${btn.dataset.id}`, { method: 'DELETE' });
            showToast('Person deleted');
            await renderPeopleList();
            await renderBoard();
          } catch (err) { showToast(err.message); }
        });
      });
    }
    document.getElementById('peopleBtn').addEventListener('click', () => { renderPeopleList(); openModal('peopleModalOverlay'); });
    document.getElementById('closePeopleBtn').addEventListener('click', () => closeModal('peopleModalOverlay'));
    document.getElementById('addPersonBtn').addEventListener('click', async () => {
      try {
        await api('/api/people', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: document.getElementById('pName').value, color: document.getElementById('pColor').value }) });
        document.getElementById('pName').value = '';
        showToast('Person created');
        await renderPeopleList();
      } catch (err) { showToast(err.message); }
    });

    // Sprints modal
    let editingSprintId = null;

    async function renderSprintsList() {
      const data = await fetchSprints();
      const container = document.getElementById('sprintsList');
      container.innerHTML = (data.sprints || []).map(s => {
        const isEditing = editingSprintId === s.id;
        if (isEditing) {
          return `
            <div style="margin-bottom:0.5rem;padding:0.5rem;background:#0f172a;border-radius:0.375rem">
              <div style="display:flex;gap:0.5rem;margin-bottom:0.5rem;flex-wrap:wrap">
                <input id="seName-${s.id}" value="${escapeHtml(s.name)}" style="flex:1;min-width:120px" />
                <input id="seStart-${s.id}" type="date" value="${s.start_date}" />
                <input id="seEnd-${s.id}" type="date" value="${s.end_date}" />
              </div>
              <div style="display:flex;gap:0.5rem;justify-content:flex-end">
                <button class="cancel-edit" data-id="${s.id}" style="font-size:0.75rem;padding:0.25rem 0.5rem">Cancel</button>
                <button class="primary save-edit" data-id="${s.id}" style="font-size:0.75rem;padding:0.25rem 0.5rem">Save</button>
              </div>
            </div>
          `;
        }
        return `
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;padding:0.5rem;background:#0f172a;border-radius:0.375rem">
            <div>
              <div style="font-weight:500">${escapeHtml(s.name)} <span style="font-size:0.75rem;color:#94a3b8">(${s.status})</span></div>
              <div class="sprint-info">${s.start_date} → ${s.end_date}</div>
            </div>
            <div style="display:flex;gap:0.35rem">
              <button class="edit-sprint" style="font-size:0.75rem;padding:0.25rem 0.5rem" data-id="${s.id}">Edit</button>
              ${s.status === 'active' ? `<button class="primary complete-sprint" style="font-size:0.75rem;padding:0.25rem 0.5rem" data-id="${s.id}">Complete</button>` : `<button class="primary incomplete-sprint" style="font-size:0.75rem;padding:0.25rem 0.5rem" data-id="${s.id}">Incomplete</button>`}
              <button class="danger delete-sprint" style="font-size:0.75rem;padding:0.25rem 0.5rem" data-id="${s.id}">Delete</button>
            </div>
          </div>
        `;
      }).join('');

      container.querySelectorAll('.edit-sprint').forEach(btn => {
        btn.addEventListener('click', () => { editingSprintId = Number(btn.dataset.id); renderSprintsList(); });
      });

      container.querySelectorAll('.cancel-edit').forEach(btn => {
        btn.addEventListener('click', () => { editingSprintId = null; renderSprintsList(); });
      });

      container.querySelectorAll('.save-edit').forEach(btn => {
        btn.addEventListener('click', async () => {
          const sid = Number(btn.dataset.id);
          try {
            await api(`/api/sprints/${sid}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                name: document.getElementById(`seName-${sid}`).value,
                start_date: document.getElementById(`seStart-${sid}`).value,
                end_date: document.getElementById(`seEnd-${sid}`).value,
              }),
            });
            showToast('Sprint updated');
            editingSprintId = null;
            await renderSprintsList();
            await populateSprintFilter();
            await renderBoard();
          } catch (err) { showToast(err.message); }
        });
      });

      container.querySelectorAll('.complete-sprint').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Complete this sprint? All tasks will be moved to Completed.')) return;
          try {
            await api(`/api/sprints/${btn.dataset.id}/complete`, { method: 'POST' });
            showToast('Sprint completed');
            await renderSprintsList();
            await renderBoard();
            await populateSprintFilter();
          } catch (err) { showToast(err.message); }
        });
      });

      container.querySelectorAll('.incomplete-sprint').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Reactivate this sprint?')) return;
          try {
            await api(`/api/sprints/${btn.dataset.id}/incomplete`, { method: 'POST' });
            showToast('Sprint reactivated');
            await renderSprintsList();
            await renderBoard();
            await populateSprintFilter();
          } catch (err) { showToast(err.message); }
        });
      });

      container.querySelectorAll('.delete-sprint').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Delete this sprint?')) return;
          try {
            await api(`/api/sprints/${btn.dataset.id}`, { method: 'DELETE' });
            showToast('Sprint deleted');
            await renderSprintsList();
            await populateSprintFilter();
            await renderBoard();
          } catch (err) { showToast(err.message); }
        });
      });
    }
    document.getElementById('sprintBtn').addEventListener('click', () => { renderSprintsList(); openModal('sprintsModalOverlay'); });
    document.getElementById('closeSprintsBtn').addEventListener('click', () => closeModal('sprintsModalOverlay'));
    document.getElementById('addSprintBtn').addEventListener('click', async () => {
      try {
        await api('/api/sprints', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: document.getElementById('sName').value, start_date: document.getElementById('sStart').value, end_date: document.getElementById('sEnd').value }) });
        document.getElementById('sName').value = '';
        document.getElementById('sStart').value = '';
        document.getElementById('sEnd').value = '';
        showToast('Sprint created');
        await renderSprintsList();
        await populateSprintFilter();
      } catch (err) { showToast(err.message); }
    });

    // Filters
    sprintFilterEl.addEventListener('change', renderBoard);
    document.getElementById('activeSprintBtn').addEventListener('click', async () => {
      await fetchSprints();
      const active = allSprints.find(s => s.status === 'active');
      if (active) {
        sprintFilterEl.value = active.id;
        renderBoard();
      } else {
        showToast('No active sprint');
      }
    });
    document.getElementById('assigneeFilter').addEventListener('change', renderBoard);
    document.getElementById('labelFilter').addEventListener('change', renderBoard);
    searchBtn.addEventListener('click', renderBoard);
    searchInputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') renderBoard(); });
    document.getElementById('archivedToggle').addEventListener('change', renderBoard);
    sortSelect.addEventListener('change', () => {
      localStorage.setItem('pi-board-sort', sortSelect.value);
      renderBoard();
    });

    function startAutoRefresh() {
      if (autoRefreshInterval) clearInterval(autoRefreshInterval);
      const ms = Number(autoRefreshSelect.value);
      if (ms > 0) {
        autoRefreshInterval = setInterval(() => {
          if (!isModalOpen && !isDragging) { renderBoard(); populateSprintFilter(); }
        }, ms);
      }
    }

    refreshBtn.addEventListener('click', async () => {
      await renderBoard();
      await populateSprintFilter();
      showToast('Refreshed');
    });
    autoRefreshSelect.addEventListener('change', () => {
      localStorage.setItem('pi-board-auto-refresh', autoRefreshSelect.value);
      startAutoRefresh();
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
      if (e.key === 'n' || e.key === 'N') {
        e.preventDefault();
        document.getElementById('addTaskBtn').click();
      }
      if (e.key === 'Escape') {
        document.querySelectorAll('.modal-overlay.open').forEach(m => m.classList.remove('open'));
        isModalOpen = false;
      }
      if ((e.key === 'e' || e.key === 'E') && isModalOpen && document.getElementById('taskModalOverlay').classList.contains('open')) {
        e.preventDefault();
        if (document.getElementById('taskView').style.display !== 'none') {
          document.getElementById('editTaskBtn').click();
        }
      }
      if ((e.key === 'd' || e.key === 'D') && isModalOpen && document.getElementById('taskModalOverlay').classList.contains('open')) {
        e.preventDefault();
        if (confirm('Delete this task?')) {
          document.getElementById('deleteTaskBtn').click();
        }
      }
      if (e.key === '?') {
        e.preventDefault();
        alert('Keyboard shortcuts:\nN = New task\nE = Edit task (when modal open)\nD = Delete task (when modal open)\nEsc = Close modal\n? = This help');
      }
    });

    // Initial load
    (async () => {
      await populateSprintFilter();
      await populateAssigneeFilter();
      await populateLabelFilter();
      await renderBoard();
      startAutoRefresh();
    })();
  </script>
</body>
</html>
